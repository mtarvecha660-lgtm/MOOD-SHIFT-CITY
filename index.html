<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mood Shift City: Resource War</title>
    <style>
        body { margin:0; overflow:hidden; background:black; font-family:'Segoe UI', sans-serif; touch-action: none; }
        
        #ui {
            position:absolute; top:10px; left:10px; color:white; z-index:5;
            font-size:16px; text-shadow: 0 0 10px #000; font-weight: bold;
            background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; pointer-events: none;
        }

        .touch-controls { display: none; }
        .touch-btn {
            position: absolute; bottom: 30px; right: 30px;
            width: 80px; height: 80px; background: rgba(255, 255, 255, 0.2);
            border: 2px solid white; border-radius: 50%; z-index: 15;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; user-select: none;
        }
        #reload-btn { right: 130px; width: 60px; height: 60px; bottom: 40px; font-size: 10px; }
        #joystick-container {
            position: absolute; bottom: 30px; left: 30px;
            width: 120px; height: 120px; background: rgba(255, 255, 255, 0.1);
            border-radius: 50%; z-index: 15;
        }
        #joystick-knob {
            position: absolute; top: 35px; left: 35px;
            width: 50px; height: 50px; background: white;
            border-radius: 50%; opacity: 0.5;
        }

        #rotate-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }
        @media screen and (orientation: portrait) and (max-width: 1024px) {
            #rotate-overlay { display: flex; }
        }

        #menu, #gameover {
            position:absolute; top:0; left:0; width:100%; height:100%;
            display:flex; align-items:center; justify-content:center;
            background:radial-gradient(circle, #1a1a2e 0%, #000000 100%); color:white; flex-direction:column; z-index:20;
        }
        button { padding:15px 40px; font-size:18px; cursor:pointer; background:#ff0040; color:white; border:none; border-radius:8px; }
        #crosshair {
            position:absolute; top:50%; left:50%;
            width:12px; height:12px; margin-left:-6px; margin-top:-6px;
            border:2px solid #00ffff; border-radius:50%; z-index:5; pointer-events:none;
        }
        #reload-msg { color: #ffcc00; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div id="rotate-overlay">
    <h2>🔄 ROTATE TO LANDSCAPE</h2>
    <p>Please rotate your device to play.</p>
</div>

<div id="menu">
    <h1>MOOD SHIFT CITY</h1>
    <p style="color:#00ffff;">COLLECT DROPS TO SURVIVE</p>
    <button onclick="startGame()">START PROTOCOL</button>
</div>

<div id="gameover" style="display:none;">
    <h1 style="color:#ff3040;">SIGNAL LOST</h1>
    <p>Score: <span id="final-score">0</span></p>
    <button onclick="location.reload()">REBOOT</button>
</div>

<div id="ui" style="display:none;">
    HP: <span id="hp-val">100</span>% | AMMO: <span id="ammo-val">12</span>/<span id="reserve-val">48</span><br>
    SCORE: <span id="score-val">0</span> | <span id="wave-status">WAVE 1</span><br>
    <span style="color:#0ff">ENEMIES: <span id="enemies-left">0</span></span>
    <div id="reload-msg">LOW AMMO - PRESS R</div>
</div>

<div id="joystick-container" class="touch-controls"><div id="joystick-knob"></div></div>
<div id="fire-btn" class="touch-controls touch-btn">FIRE</div>
<div id="reload-btn" class="touch-controls touch-btn">RELOAD</div>
<div id="crosshair" style="display:none;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let scene, camera, renderer, player;
let enemies=[], bullets=[], particles=[], buildings=[], drops=[];
let hp=100, score=0, keys={}, gameRunning=false;
let yaw=0, pitch=0, lastShotTime=0, shakeAmount=0;
let isMobile = false;

// AMMO & WAVES
let ammo = 12, maxClip = 12, reserve = 48, isReloading = false;
const SHOOT_COOLDOWN = 180;
let wave = 0, enemiesToSpawn = 0, isWaveTransition = false;

// MOBILE STATE
let joystick = { active: false, x: 0, y: 0, touchId: null };
let lookTouch = { active: false, id: null, lastX: 0, lastY: 0 };

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const Sound = {
    play(freq, type, duration, vol) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    },
    shoot() { this.play(400, 'square', 0.1, 0.05); },
    explode() { this.play(80, 'sawtooth', 0.4, 0.1); },
    pickup() { this.play(800, 'sine', 0.1, 0.08); },
    reload() { this.play(200, 'triangle', 0.1, 0.03); }
};

function checkDevice() {
    isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
}

function startGame() {
    checkDevice();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById("menu").style.display = "none";
    document.getElementById("ui").style.display = "block";
    document.getElementById("crosshair").style.display = "block";

    if (isMobile) {
        document.querySelectorAll('.touch-controls').forEach(el => el.style.display = 'flex');
    } else {
        document.body.requestPointerLock();
    }

    init();
    gameRunning = true;
    startWave(1);
    animate();
}

// --- INPUTS ---
document.addEventListener("mousemove", (e) => {
    if(!gameRunning || isMobile || document.pointerLockElement !== document.body) return;
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-1.4, Math.min(1.4, pitch));
});

window.addEventListener("touchstart", (e) => {
    for (let t of e.changedTouches) {
        if (t.clientX < window.innerWidth / 2) {
            joystick.active = true; joystick.touchId = t.identifier;
        } else {
            lookTouch.active = true; lookTouch.id = t.identifier;
            lookTouch.lastX = t.clientX; lookTouch.lastY = t.clientY;
        }
    }
}, {passive: false});

window.addEventListener("touchmove", (e) => {
    for (let t of e.changedTouches) {
        if (joystick.active && t.identifier === joystick.touchId) {
            let dx = t.clientX - 90, dy = t.clientY - (window.innerHeight - 90);
            let dist = Math.min(Math.hypot(dx, dy), 50);
            let angle = Math.atan2(dy, dx);
            joystick.x = (Math.cos(angle) * dist) / 50;
            joystick.y = (Math.sin(angle) * dist) / 50;
            document.getElementById("joystick-knob").style.transform = `translate(${joystick.x * 35}px, ${joystick.y * 35}px)`;
        } else if (lookTouch.active && t.identifier === lookTouch.id) {
            yaw -= (t.clientX - lookTouch.lastX) * 0.006;
            pitch -= (t.clientY - lookTouch.lastY) * 0.006;
            pitch = Math.max(-1.4, Math.min(1.4, pitch));
            lookTouch.lastX = t.clientX; lookTouch.lastY = t.clientY;
        }
    }
}, {passive: false});

window.addEventListener("touchend", (e) => {
    for (let t of e.changedTouches) {
        if (t.identifier === joystick.touchId) {
            joystick.active = false; joystick.x = 0; joystick.y = 0;
            document.getElementById("joystick-knob").style.transform = `translate(0,0)`;
        }
        if (t.identifier === lookTouch.id) lookTouch.active = false;
    }
});

document.getElementById("fire-btn").addEventListener("touchstart", (e) => { e.preventDefault(); shoot(); });
document.getElementById("reload-btn").addEventListener("touchstart", (e) => { e.preventDefault(); reload(); });

function init(){
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000011, 0.03);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    let l1=new THREE.PointLight(0xff00ff, 1.5, 60); l1.position.set(20, 10, 20); scene.add(l1);
    
    let road = new THREE.Mesh(new THREE.PlaneGeometry(300,300), new THREE.MeshStandardMaterial({color:0x111111}));
    road.rotation.x = -Math.PI/2;
    scene.add(road);

    for(let i=0; i<35; i++){
        let bh = Math.random()*15+5;
        let mesh = new THREE.Mesh(new THREE.BoxGeometry(4,bh,4), new THREE.MeshStandardMaterial({color:0x222222}));
        let bx = Math.random()*160-80, bz = Math.random()*160-80;
        if(Math.abs(bx)<10 && Math.abs(bz)<10) bx+=20;
        mesh.position.set(bx, bh/2, bz);
        scene.add(mesh);
        buildings.push({mesh, minX: bx-2, maxX: bx+2, minY: 0, maxY: bh, minZ: bz-2, maxZ: bz+2});
    }

    player = new THREE.Object3D();
    player.position.set(0, 1.7, 0);
    scene.add(player);

    document.addEventListener("keydown", e => { keys[e.key.toLowerCase()] = true; if(e.key.toLowerCase()==='r') reload(); });
    document.addEventListener("keyup", e => keys[e.key.toLowerCase() ] = false);
    document.addEventListener("mousedown", () => { if(gameRunning && !isMobile) shoot(); });
}

// --- DROP SYSTEM ---
function spawnDrop(pos) {
    // 1. Calculate drop chance (standard 40%)
    let dropChance = 0.4;
    
    // 2. Desperation check: If totally out of ammo, force a drop
    if (ammo === 0 && reserve === 0) dropChance = 1.0;

    if (Math.random() > dropChance) return; 
    
    let isHealth;

    // 3. Status-Based Logic
    if (hp >= 100) {
        // If health is full, always drop ammo
        isHealth = false;
    } else if (reserve < 12) {
        // If ammo is critically low, 80% chance for ammo
        isHealth = Math.random() > 0.8;
    } else {
        // Otherwise, 50/50 split
        isHealth = Math.random() > 0.5;
    }
    
    let color = isHealth ? 0xff0000 : 0x00ffff;
    
    let dropMesh = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 0.5, 0.5),
        new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.8 })
    );
    dropMesh.position.set(pos.x, 0.5, pos.z);
    scene.add(dropMesh);
    drops.push({ mesh: dropMesh, type: isHealth ? 'hp' : 'ammo' });
}

function updateDrops() {
    for (let i = drops.length - 1; i >= 0; i--) {
        let d = drops[i];
        d.mesh.rotation.y += 0.05;
        d.mesh.position.y = 0.5 + Math.sin(Date.now() * 0.005) * 0.1; // Floating effect
        
        if (player.position.distanceTo(d.mesh.position) < 1.5) {
            Sound.pickup();
            if (d.type === 'hp') hp = Math.min(100, hp + 20);
            else reserve += 24;
            scene.remove(d.mesh);
            drops.splice(i, 1);
        }
    }
}

// --- WAVE SYSTEM ---
function startWave(num) {
    wave = num;
    enemiesToSpawn = 3 + (num * 2);
    isWaveTransition = true;
    document.getElementById("wave-status").innerText = "PREPARING...";
    
    setTimeout(() => {
        if(!gameRunning) return;
        isWaveTransition = false;
        document.getElementById("wave-status").innerText = "WAVE " + wave;
        let spawner = setInterval(() => {
            if(enemiesToSpawn > 0 && gameRunning) {
                spawnEnemy();
                enemiesToSpawn--;
            } else {
                clearInterval(spawner);
            }
        }, 1000);
    }, 2000);
}

function spawnEnemy(){
    let angle = Math.random() * Math.PI * 2;
    let dist = 25 + Math.random() * 15;
    let ex = player.position.x + Math.cos(angle) * dist, ez = player.position.z + Math.sin(angle) * dist;
    let typeRoll = Math.random();
    let type = { color: 0xff0040, hp: 100, speed: 0.07, size: 1 };
    if(typeRoll > 0.8) type = { color: 0xaa00ff, hp: 350, speed: 0.04, size: 1.7 };
    if(typeRoll < 0.2) type = { color: 0xffff00, hp: 50, speed: 0.15, size: 0.7 };
    
    let mesh = new THREE.Mesh(new THREE.BoxGeometry(type.size, type.size*2, type.size), new THREE.MeshStandardMaterial({color: type.color, emissive: type.color, emissiveIntensity: 0.5}));
    mesh.position.set(ex, type.size, ez);
    scene.add(mesh);
    enemies.push({mesh, hp: type.hp, speed: type.speed, size: type.size});
}

function reload(){
    if(isReloading || reserve <= 0 || ammo === maxClip) return;
    isReloading = true; Sound.reload();
    document.getElementById("wave-status").innerText = "RELOADING...";
    setTimeout(() => { 
        let needed = maxClip - ammo; let transfer = Math.min(needed, reserve);
        ammo += transfer; reserve -= transfer; isReloading = false;
        document.getElementById("wave-status").innerText = "WAVE " + wave;
    }, 1200);
}

function shoot(){
    if(!gameRunning || isReloading || ammo <= 0) return;
    const now = performance.now(); if(now - lastShotTime < SHOOT_COOLDOWN) return;
    ammo--; lastShotTime = now; Sound.shoot(); shakeAmount = 0.07;
    let bullet = new THREE.Mesh(new THREE.SphereGeometry(0.1,8,8), new THREE.MeshBasicMaterial({color:0xffff00}));
    bullet.position.copy(player.position);
    let dir = new THREE.Vector3(-Math.sin(yaw)*Math.cos(pitch), Math.sin(pitch), -Math.cos(yaw)*Math.cos(pitch)).normalize();
    bullets.push({mesh:bullet, dir, dist:0}); scene.add(bullet);
}

function resolveVsBuildingsXZ(pos, size){
    for(let b of buildings){
        let dx = pos.x - (b.minX + b.maxX)/2, dz = pos.z - (b.minZ + b.maxZ)/2;
        let ox = (size + 2) - Math.abs(dx), oz = (size + 2) - Math.abs(dz);
        if(ox > 0 && oz > 0){ if(ox < oz) pos.x += ox * Math.sign(dx); else pos.z += oz * Math.sign(dz); }
    }
}

function animate(){
    if(!gameRunning) return;
    if(hp <= 0) { 
        gameRunning = false; document.getElementById("gameover").style.display="flex"; 
        document.getElementById("final-score").innerText = score; return; 
    }
    requestAnimationFrame(animate);

    let sp = 0.16;
    let fw = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
    let rt = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
    
    if (!isMobile) {
        if(keys["w"]) player.position.add(fw.clone().multiplyScalar(sp));
        if(keys["s"]) player.position.add(fw.clone().multiplyScalar(-sp));
        if(keys["a"]) player.position.add(rt.clone().multiplyScalar(-sp));
        if(keys["d"]) player.position.add(rt.clone().multiplyScalar(sp));
    } else if (joystick.active) {
        player.position.add(fw.clone().multiplyScalar(-joystick.y * sp));
        player.position.add(rt.clone().multiplyScalar(joystick.x * sp));
    }

    resolveVsBuildingsXZ(player.position, 0.5);
    camera.position.copy(player.position);
    if(shakeAmount > 0) { camera.position.x += (Math.random()-0.5)*shakeAmount; camera.position.y += (Math.random()-0.5)*shakeAmount; shakeAmount *= 0.85; }
    camera.rotation.set(pitch, yaw, 0, 'YXZ');

    for(let i=bullets.length-1; i>=0; i--){
        let b=bullets[i]; b.mesh.position.add(b.dir.clone().multiplyScalar(1.6)); b.dist += 1.6;
        let hit = false;
        for(let e of enemies){ 
            if(e.mesh.position.distanceTo(b.mesh.position) < (e.size+0.4)){ e.hp -= 50; hit = true; break; } 
        }
        if(hit || b.dist > 100) { scene.remove(b.mesh); bullets.splice(i, 1); }
    }

    for(let i=enemies.length-1; i>=0; i--){
        let e = enemies[i];
        if(e.hp <= 0){ 
            Sound.explode(); 
            score += 25; 
            spawnDrop(e.mesh.position); // SPWAN DROP HERE
            scene.remove(e.mesh); 
            enemies.splice(i,1); 
            continue; 
        }
        let dir = player.position.clone().sub(e.mesh.position).normalize();
        e.mesh.position.add(dir.multiplyScalar(e.speed)); e.mesh.position.y = e.size;
        if(e.mesh.position.distanceTo(player.position) < 1.6) { hp -= 0.4; shakeAmount = 0.05; }
    }

    if(enemies.length === 0 && enemiesToSpawn === 0 && !isWaveTransition) {
        startWave(wave + 1);
    }

    updateDrops(); // CHECK FOR PICKUPS

    document.getElementById("hp-val").innerText = Math.max(0, Math.ceil(hp));
    document.getElementById("ammo-val").innerText = ammo;
    document.getElementById("reserve-val").innerText = reserve;
    document.getElementById("score-val").innerText = score;
    document.getElementById("enemies-left").innerText = enemies.length + enemiesToSpawn;
    document.getElementById("reload-msg").style.display = (ammo <= 3 && reserve > 0) ? "block" : "none";

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
