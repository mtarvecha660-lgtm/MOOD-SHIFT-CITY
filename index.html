<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mood Shift City: Ultra Vis</title>
    <style>
        body { margin:0; overflow:hidden; background:black; font-family:'Segoe UI', sans-serif; touch-action: none; }
        #ui {
            position:absolute; top:10px; left:10px; color:white; z-index:5;
            font-size:18px; text-shadow: 0 0 10px #000; font-weight: bold;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; pointer-events: none;
            border: 1px solid #333;
        }
        .touch-controls { display: none; }
        .touch-btn {
            position: absolute; bottom: 30px; right: 30px;
            width: 90px; height: 90px; background: rgba(255, 0, 64, 0.3);
            border: 3px solid #ff0040; border-radius: 50%; z-index: 15;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; user-select: none;
        }
        #reload-btn { right: 140px; width: 70px; height: 70px; bottom: 40px; font-size: 12px; background: rgba(0, 255, 255, 0.2); border-color: #00ffff; }
        #joystick-container {
            position: absolute; bottom: 30px; left: 30px;
            width: 140px; height: 140px; background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; z-index: 15;
        }
        #joystick-knob {
            position: absolute; top: 45px; left: 45px;
            width: 50px; height: 50px; background: #00ffff;
            border-radius: 50%; box-shadow: 0 0 15px #00ffff;
        }
        #menu, #gameover {
            position:absolute; top:0; left:0; width:100%; height:100%;
            display:flex; align-items:center; justify-content:center;
            background:radial-gradient(circle, #001a33 0%, #000000 100%); color:white; flex-direction:column; z-index:20;
        }
        button { padding:20px 50px; font-size:22px; cursor:pointer; background:#ff0040; color:white; border:none; border-radius:8px; box-shadow: 0 0 20px #ff0040; }
        #crosshair {
            position:absolute; top:50%; left:50%;
            width:20px; height:20px; margin-left:-10px; margin-top:-10px;
            border:2px solid #00ffff; border-radius:50%; z-index:5; pointer-events:none;
        }
        #crosshair::after { content:''; position:absolute; top:9px; left:9px; width:2px; height:2px; background:#00ffff; }
        #reload-msg { color: #ffcc00; font-weight: bold; display: none; margin-top: 5px; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Rotate Device Overlay */
        #rotate-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000010;
            z-index: 9999;
            flex-direction: column;
            align-items: center; justify-content: center;
            color: white; text-align: center;
        }
        #rotate-overlay .rotate-icon {
            font-size: 80px;
            animation: rotateAnim 1.5s ease-in-out infinite;
            display: block; margin-bottom: 20px;
        }
        #rotate-overlay p {
            font-size: 20px; color: #00ffff;
            letter-spacing: 2px; text-shadow: 0 0 10px #00ffff;
        }
        @keyframes rotateAnim {
            0%   { transform: rotate(0deg); }
            40%  { transform: rotate(90deg); }
            60%  { transform: rotate(90deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>

<!-- Rotate Device Overlay (mobile portrait only) -->
<div id="rotate-overlay">
    <span class="rotate-icon">📱</span>
    <p>ROTATE YOUR DEVICE<br>TO LANDSCAPE</p>
</div>

<div id="menu">
    <h1 style="letter-spacing: 5px;">MOOD SHIFT CITY</h1>
    <p style="color:#00ffff; margin-bottom: 30px;">HIGH-VIS PROTOCOL ENABLED</p>
    <button onclick="startGame()">START SYSTEM</button>
</div>

<div id="gameover" style="display:none;">
    <h1 style="color:#ff3040;">SIGNAL TERMINATED</h1>
    <p>Data Collected: <span id="final-score">0</span></p>
    <button onclick="location.reload()">REBOOT</button>
</div>

<div id="ui" style="display:none;">
    HP: <span id="hp-val" style="color:#ff0040;">100</span>% | AMMO: <span id="ammo-val" style="color:#00ffff;">12</span>/<span id="reserve-val">48</span><br>
    SCORE: <span id="score-val">0</span> | <span id="wave-status" style="color:#ffff00;">WAVE 1</span><br>
    <span style="color:#0ff">ENEMIES: <span id="enemies-left">0</span></span>
    <div id="reload-msg">RELOAD REQUIRED (R)</div>
</div>

<div id="joystick-container" class="touch-controls"><div id="joystick-knob"></div></div>
<div id="fire-btn" class="touch-controls touch-btn">FIRE</div>
<div id="reload-btn" class="touch-controls touch-btn">RELOAD</div>
<div id="crosshair" style="display:none;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let scene, camera, renderer, player;
let enemies=[], bullets=[], buildings=[], drops=[], particles=[];
let hp=100, score=0, keys={}, gameRunning=false;
let yaw=0, pitch=0, lastShotTime=0, shakeAmount=0;
let isMobile = false;

// Upgraded Particle Config
const MAX_PARTICLES = 100;
const PARTICLE_SIZE = 0.25; // Bigger particles
let ammo = 12, maxClip = 12, reserve = 48, isReloading = false;
const SHOOT_COOLDOWN = 150;
let wave = 0, enemiesToSpawn = 0, isWaveTransition = false;

let joystick = { active: false, x: 0, y: 0, touchId: null };
let lookTouch = { active: false, id: null, lastX: 0, lastY: 0 };

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const Sound = {
    play(freq, type, duration, vol) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    },
    shoot() { this.play(400, 'square', 0.1, 0.05); },
    explode() { this.play(60, 'sawtooth', 0.5, 0.12); },
    pickup() { this.play(900, 'sine', 0.2, 0.1); },
    reload() { this.play(250, 'triangle', 0.2, 0.04); }
};

function checkDevice() { isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0); }

/* ── Landscape / Fullscreen for Mobile ── */
function isLandscape() { return window.innerWidth > window.innerHeight; }

function requestFullscreen() {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (req) req.call(el).catch(() => {});
    // Also try Screen Orientation API to lock landscape
    if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(() => {});
    }
}

function updateOrientationOverlay() {
    if (!isMobile) return; // Desktop: never show overlay
    const overlay = document.getElementById('rotate-overlay');
    if (!isLandscape()) {
        overlay.style.display = 'flex';
        if (gameRunning) { gameRunning = false; } // Pause game in portrait
    } else {
        overlay.style.display = 'none';
        // Resume game if it was running before rotation
        if (hp > 0 && scene && !gameRunning && document.getElementById('ui').style.display === 'block') {
            gameRunning = true;
            animate();
        }
    }
}

window.addEventListener('resize', updateOrientationOverlay);
window.addEventListener('orientationchange', () => setTimeout(updateOrientationOverlay, 300));


function checkCollision(pos, radius) {
    for (let b of buildings) {
        if (pos.x + radius > b.minX && pos.x - radius < b.maxX &&
            pos.z + radius > b.minZ && pos.z - radius < b.maxZ &&
            pos.y < b.maxY) return true;
    }
    return false;
}

function createImpact(pos, color, count = 8) {
    for (let i = 0; i < count; i++) {
        let p = particles.find(p => !p.active);
        if (!p) break;
        p.active = true; p.mesh.visible = true; p.life = 1.0;
        p.mesh.position.copy(pos);
        p.mesh.material.color.setHex(color);
        // Faster, more varied spread
        p.velocity.set(
            (Math.random() - 0.5) * 0.4,
            (Math.random() - 0.2) * 0.4, 
            (Math.random() - 0.5) * 0.4
        );
    }
}

function init(){
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000005);
    scene.fog = new THREE.FogExp2(0x000011, 0.04);
    
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.2));
    let sun = new THREE.DirectionalLight(0x00ffff, 0.5);
    sun.position.set(5, 10, 5);
    scene.add(sun);
    
    let road = new THREE.Mesh(new THREE.PlaneGeometry(500,500), new THREE.MeshStandardMaterial({color:0x080808}));
    road.rotation.x = -Math.PI/2;
    scene.add(road);

    // Bigger, Brighter Buildings
    for(let i=0; i<40; i++){
        let bh = Math.random()*20+10;
        let bColor = Math.random() > 0.5 ? 0x111111 : 0x1a1a1a;
        let mesh = new THREE.Mesh(new THREE.BoxGeometry(5,bh,5), new THREE.MeshStandardMaterial({color: bColor, emissive: 0x000000}));
        let bx = Math.random()*200-100, bz = Math.random()*200-100;
        if(Math.abs(bx)<15 && Math.abs(bz)<15) bx+=25;
        mesh.position.set(bx, bh/2, bz);
        scene.add(mesh);
        buildings.push({minX: bx-2.5, maxX: bx+2.5, minY: 0, maxY: bh, minZ: bz-2.5, maxZ: bz+2.5});
        
        // Window lights for visibility
        if(Math.random() > 0.3) {
            let win = new THREE.PointLight(Math.random() > 0.5 ? 0xff0040 : 0x00ffff, 1, 15);
            win.position.set(bx, bh * 0.8, bz);
            scene.add(win);
        }
    }

    // High-Vis Particle Pool
    const pGeo = new THREE.SphereGeometry(PARTICLE_SIZE, 4, 4);
    for (let i = 0; i < MAX_PARTICLES; i++) {
        const pMesh = new THREE.Mesh(pGeo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
        pMesh.visible = false; scene.add(pMesh);
        particles.push({ mesh: pMesh, velocity: new THREE.Vector3(), active: false, life: 0 });
    }

    player = new THREE.Object3D();
    player.position.set(0, 1.8, 0);
    scene.add(player);

    setupControls();
}

function setupControls() {
    document.addEventListener("keydown", e => { keys[e.key.toLowerCase()] = true; if(e.key.toLowerCase()==='r') reload(); });
    document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
    document.addEventListener("mousedown", () => { if(gameRunning && !isMobile) shoot(); });
    document.addEventListener("mousemove", (e) => {
        if(!gameRunning || isMobile || document.pointerLockElement !== document.body) return;
        yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
        pitch = Math.max(-1.4, Math.min(1.4, pitch));
    });

    // Touch handlers
    window.addEventListener("touchstart", (e) => {
        for (let t of e.changedTouches) {
            if (t.clientX < window.innerWidth / 2) {
                joystick.active = true; joystick.touchId = t.identifier;
            } else {
                lookTouch.active = true; lookTouch.id = t.identifier;
                lookTouch.lastX = t.clientX; lookTouch.lastY = t.clientY;
            }
        }
    }, {passive: false});

    window.addEventListener("touchmove", (e) => {
        for (let t of e.changedTouches) {
            if (joystick.active && t.identifier === joystick.touchId) {
                let dx = t.clientX - 100, dy = t.clientY - (window.innerHeight - 100);
                let dist = Math.min(Math.hypot(dx, dy), 60);
                let angle = Math.atan2(dy, dx);
                joystick.x = (Math.cos(angle) * dist) / 60; joystick.y = (Math.sin(angle) * dist) / 60;
                document.getElementById("joystick-knob").style.transform = `translate(${joystick.x * 40}px, ${joystick.y * 40}px)`;
            } else if (lookTouch.active && t.identifier === lookTouch.id) {
                yaw -= (t.clientX - lookTouch.lastX) * 0.007; pitch -= (t.clientY - lookTouch.lastY) * 0.007;
                pitch = Math.max(-1.4, Math.min(1.4, pitch));
                lookTouch.lastX = t.clientX; lookTouch.lastY = t.clientY;
            }
        }
    }, {passive: false});

    window.addEventListener("touchend", (e) => {
        for (let t of e.changedTouches) {
            if (t.identifier === joystick.touchId) {
                joystick.active = false; joystick.x = 0; joystick.y = 0;
                document.getElementById("joystick-knob").style.transform = `translate(0,0)`;
            }
            if (t.identifier === lookTouch.id) lookTouch.active = false;
        }
    });

    document.getElementById("fire-btn").addEventListener("touchstart", (e) => { e.preventDefault(); shoot(); });
    document.getElementById("reload-btn").addEventListener("touchstart", (e) => { e.preventDefault(); reload(); });
}

function startGame() {
    checkDevice();
    if (isMobile) {
        requestFullscreen();
        if (!isLandscape()) {
            updateOrientationOverlay();
            return; // Don't start until landscape
        }
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById("menu").style.display = "none";
    document.getElementById("ui").style.display = "block";
    document.getElementById("crosshair").style.display = "block";
    if (!isMobile) document.body.requestPointerLock();
    else document.querySelectorAll('.touch-controls').forEach(el => el.style.display = 'flex');
    init();
    gameRunning = true;
    startWave(1);
    animate();
}

function startWave(num) {
    wave = num; enemiesToSpawn = 5 + (num * 2); isWaveTransition = true;
    document.getElementById("wave-status").innerText = "SIGNAL STABILIZING...";
    setTimeout(() => {
        if(!gameRunning) return;
        isWaveTransition = false;
        document.getElementById("wave-status").innerText = "WAVE " + wave;
        let spawner = setInterval(() => {
            if(enemiesToSpawn > 0 && gameRunning) { spawnEnemy(); enemiesToSpawn--; } 
            else clearInterval(spawner);
        }, 800);
    }, 1500);
}

function spawnEnemy(){
    let angle = Math.random() * Math.PI * 2, dist = 30 + Math.random() * 20;
    let ex = player.position.x + Math.cos(angle) * dist, ez = player.position.z + Math.sin(angle) * dist;
    let typeRoll = Math.random();
    
    // Visually distinct enemies
    let type = { color: 0xff0040, hp: 100, speed: 0.08, size: 1.2 };
    if(typeRoll > 0.8) type = { color: 0xaa00ff, hp: 400, speed: 0.05, size: 2.2 }; // Tanks
    if(typeRoll < 0.2) type = { color: 0xffff00, hp: 40, speed: 0.18, size: 0.8 };  // Scouts
    
    let mesh = new THREE.Mesh(
        new THREE.BoxGeometry(type.size, type.size*1.8, type.size), 
        new THREE.MeshStandardMaterial({color: type.color, emissive: type.color, emissiveIntensity: 0.8})
    );
    mesh.position.set(ex, type.size*0.9, ez);
    scene.add(mesh);
    enemies.push({ mesh, hp: type.hp, speed: type.speed, size: type.size, strafeDir: Math.random() > 0.5 ? 1 : -1, nextStrafeChange: Date.now() + 1500 });
}

function shoot(){
    if(!gameRunning || isReloading || ammo <= 0) return;
    const now = performance.now(); if(now - lastShotTime < SHOOT_COOLDOWN) return;
    ammo--; lastShotTime = now; Sound.shoot(); shakeAmount = 0.12;
    
    // Thicker Bullets
    let bullet = new THREE.Mesh(new THREE.SphereGeometry(0.2,8,8), new THREE.MeshBasicMaterial({color:0x00ffff}));
    bullet.position.copy(player.position);
    let dir = new THREE.Vector3(-Math.sin(yaw)*Math.cos(pitch), Math.sin(pitch), -Math.cos(yaw)*Math.cos(pitch)).normalize();
    bullets.push({mesh:bullet, dir, dist:0}); scene.add(bullet);
}

function reload(){
    if(isReloading || reserve <= 0 || ammo === maxClip) return;
    isReloading = true; Sound.reload();
    document.getElementById("wave-status").innerText = "RELOADING...";
    setTimeout(() => { 
        let needed = maxClip - ammo; let transfer = Math.min(needed, reserve);
        ammo += transfer; reserve -= transfer; isReloading = false;
        document.getElementById("wave-status").innerText = "WAVE " + wave;
    }, 1000);
}

function animate(){
    if(!gameRunning) return;
    if(hp <= 0) { gameRunning = false; document.getElementById("gameover").style.display="flex"; document.getElementById("final-score").innerText = score; return; }
    requestAnimationFrame(animate);

    // Player Movement
    let sp = 0.2, pSize = 0.7;
    let fw = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw)), rt = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
    let mX = 0, mZ = 0;
    if (!isMobile) {
        if(keys["w"]) { mX += fw.x * sp; mZ += fw.z * sp; } if(keys["s"]) { mX -= fw.x * sp; mZ -= fw.z * sp; }
        if(keys["a"]) { mX -= rt.x * sp; mZ -= rt.z * sp; } if(keys["d"]) { mX += rt.x * sp; mZ += rt.z * sp; }
    } else if (joystick.active) {
        mX = (fw.x * -joystick.y + rt.x * joystick.x) * sp; mZ = (fw.z * -joystick.y + rt.z * joystick.x) * sp;
    }
    player.position.x += mX; if(checkCollision(player.position, pSize)) player.position.x -= mX;
    player.position.z += mZ; if(checkCollision(player.position, pSize)) player.position.z -= mZ;

    camera.position.copy(player.position);
    if(shakeAmount > 0) { camera.position.x += (Math.random()-0.5)*shakeAmount; camera.position.y += (Math.random()-0.5)*shakeAmount; shakeAmount *= 0.88; }
    camera.rotation.set(pitch, yaw, 0, 'YXZ');

    // Bullet Logic & High-Vis Impacts
    for(let i=bullets.length-1; i>=0; i--){
        let b=bullets[i];
        let nextPos = b.mesh.position.clone().add(b.dir.clone().multiplyScalar(2.0));
        
        if(checkCollision(nextPos, 0.2) || b.dist > 150) {
            if(b.dist <= 150) createImpact(nextPos, 0x00ffff, 6); // Wall spark
            scene.remove(b.mesh); bullets.splice(i, 1); continue;
        }

        let hitEnemy = false;
        for(let e of enemies){
            let r = e.size / 2 + 0.4;
            if(nextPos.x > e.mesh.position.x-r && nextPos.x < e.mesh.position.x+r && nextPos.z > e.mesh.position.z-r && nextPos.z < e.mesh.position.z+r){
                e.hp -= 50; hitEnemy = true; 
                createImpact(nextPos, 0xff0040, 12); // Big Enemy spark
                break;
            }
        }
        if(hitEnemy) { scene.remove(b.mesh); bullets.splice(i, 1); continue; }
        b.mesh.position.copy(nextPos); b.dist += 2.0;
    }

    // Update Particles (Bigger & Glowier)
    particles.forEach(p => {
        if (!p.active) return;
        p.mesh.position.add(p.velocity); 
        p.velocity.y -= 0.01; // Gravity effect
        p.life -= 0.03;
        let s = p.life * 1.5;
        p.mesh.scale.set(s, s, s);
        // Flicker effect
        p.mesh.material.opacity = p.life;
        if (p.life <= 0) { p.active = false; p.mesh.visible = false; }
    });

    // Enemy AI & Collisions
    // Enemy AI & Collisions (Upgraded Intelligence)
    for(let i=enemies.length-1; i>=0; i--){
        let e = enemies[i];
        
        // 1. Death Check
        if(e.hp <= 0){ 
            Sound.explode(); 
            score += 50; 
            createImpact(e.mesh.position, e.mesh.material.color.getHex(), 20);
            if(Math.random() > 0.5) spawnDrop(e.mesh.position);
            scene.remove(e.mesh); 
            enemies.splice(i,1); 
            continue; 
        }

        // 2. Distance/Teleport Check (The "Catch Up" Logic)
        let distToPlayer = e.mesh.position.distanceTo(player.position);
        if(distToPlayer > 80) {
            // Teleport near player (at a distance of 30 units)
            let angle = Math.random() * Math.PI * 2;
            e.mesh.position.x = player.position.x + Math.cos(angle) * 30;
            e.mesh.position.z = player.position.z + Math.sin(angle) * 30;
            createImpact(e.mesh.position, 0xaa00ff, 15); // "Poof" effect
            continue;
        }

        // 3. Movement Logic (The "Smart Sliding" Logic)
        let toP = player.position.clone().sub(e.mesh.position).normalize();
        let sV = new THREE.Vector3(-toP.z, 0, toP.x);
        
        // Calculate desired movement
        let moveX = (toP.x * e.speed) + (sV.x * e.strafeDir * e.speed * 0.4);
        let moveZ = (toP.z * e.speed) + (sV.z * e.strafeDir * e.speed * 0.4);

        // Axis-Independent Collision (Allows sliding along walls)
        e.mesh.position.x += moveX;
        if(checkCollision(e.mesh.position, e.size/2)) {
            e.mesh.position.x -= moveX; // Blocked on X, undo it
        }

        e.mesh.position.z += moveZ;
        if(checkCollision(e.mesh.position, e.size/2)) {
            e.mesh.position.z -= moveZ; // Blocked on Z, undo it
        }
        
        // 4. Look & Attack
        e.mesh.lookAt(player.position.x, e.mesh.position.y, player.position.z);
        if(distToPlayer < 1.8) { 
            hp -= 0.5; 
            shakeAmount = 0.08; 
            createImpact(player.position, 0xffffff, 2);
        }
    }

    if(enemies.length === 0 && enemiesToSpawn === 0 && !isWaveTransition) startWave(wave + 1);

    // High-Vis Resource Drops
    for (let i = drops.length - 1; i >= 0; i--) {
        let d = drops[i]; 
        d.mesh.rotation.y += 0.08;
        d.mesh.position.y = 0.8 + Math.sin(Date.now()*0.005)*0.2;
        if (player.position.distanceTo(d.mesh.position) < 2.0) {
            Sound.pickup(); if (d.type === 'hp') hp = Math.min(100, hp + 25); else reserve += 24;
            createImpact(d.mesh.position, d.type==='hp'?0xff0000:0x00ffff, 15);
            scene.remove(d.mesh); drops.splice(i, 1);
        }
    }

    updateUI();
    renderer.render(scene, camera);
}

function spawnDrop(pos) {
    let isH = (hp < 50) ? Math.random() > 0.3 : Math.random() > 0.7;
    let col = isH ? 0xff0000 : 0x00ffff;
    let dMesh = new THREE.Mesh(new THREE.OctahedronGeometry(0.6), new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 1 }));
    dMesh.position.set(pos.x, 0.8, pos.z); scene.add(dMesh);
    drops.push({ mesh: dMesh, type: isH ? 'hp' : 'ammo' });
}

function updateUI() {
    document.getElementById("hp-val").innerText = Math.max(0, Math.ceil(hp));
    document.getElementById("ammo-val").innerText = ammo;
    document.getElementById("reserve-val").innerText = reserve;
    document.getElementById("score-val").innerText = score;
    document.getElementById("enemies-left").innerText = enemies.length + enemiesToSpawn;
    document.getElementById("reload-msg").style.display = (ammo <= 3 && reserve > 0) ? "block" : "none";
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
