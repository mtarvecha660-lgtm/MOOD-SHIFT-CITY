<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mood Shift City: AI Protocol</title>
    <style>
        /* Force full screen and prevent scrolling/bouncing */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            position: fixed; 
            background: black; 
            font-family: 'Segoe UI', sans-serif; 
            touch-action: none; 
        }

        canvas { 
            display: block; 
            width: 100vw !important; 
            height: 100vh !important; 
        }

        #ui {
            position: absolute; top: env(safe-area-inset-top, 10px); left: env(safe-area-inset-left, 10px); 
            color: white; z-index: 5; font-size: 16px; text-shadow: 0 0 10px #000; font-weight: bold;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 4px; border-left: 4px solid #ff0040;
            pointer-events: none;
        }

        .touch-controls { display: none; }
        .touch-btn {
            position: absolute; bottom: 30px; right: 30px;
            width: 80px; height: 80px; background: rgba(255, 0, 64, 0.2);
            border: 2px solid #ff0040; border-radius: 50%; z-index: 15;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; user-select: none; box-shadow: 0 0 15px #ff0040;
        }

        #reload-btn { right: 130px; width: 60px; height: 60px; bottom: 40px; font-size: 12px; background: rgba(0, 255, 255, 0.1); border-color: #00ffff;}

        #joystick-container {
            position: absolute; bottom: 30px; left: 30px;
            width: 120px; height: 120px; background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0,255,255,0.3); border-radius: 50%; z-index: 15;
        }

        #joystick-knob {
            position: absolute; top: 35px; left: 35px;
            width: 50px; height: 50px; background: #00ffff; border-radius: 50%; opacity: 0.8;
        }

        #menu, #gameover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #001a33 0%, #000 100%); color: white; flex-direction: column; z-index: 20;
        }

        button { padding: 15px 45px; font-size: 20px; cursor: pointer; background: #ff0040; color: white; border: none; border-radius: 4px; font-weight: bold; letter-spacing: 2px; }

        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; margin-left: -12px; margin-top: -12px;
            border: 2px solid rgba(0, 255, 255, 0.5); border-radius: 50%; z-index: 5; pointer-events: none;
        }

        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #0ff; opacity: 0.8; }
        #crosshair::before { top: 11px; left: 0; width: 24px; height: 2px; }
        #crosshair::after { left: 11px; top: 0; width: 2px; height: 24px; }
        #reload-msg { color: #ffcc00; margin-top: 5px; animation: blink 0.4s infinite; display: none; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="text-shadow: 0 0 20px #00ffff;">MOOD SHIFT CITY</h1>
    <p style="color:#00ffff; margin-bottom: 25px;">INTELLIGENT STALKER PROTOCOL V3.0</p>
    <button id="start-button">INITIALIZE LINK</button>
</div>

<div id="gameover" style="display:none;">
    <h1 style="color:#ff3040;">NEURAL DISCONNECT</h1>
    <p>Final Score: <span id="final-score">0</span></p>
    <button onclick="location.reload()">RE-SYNC</button>
</div>

<div id="ui" style="display:none;">
    HEALTH: <span id="hp-val">100</span>%<br>
    AMMO: <span id="ammo-val">12</span> / <span id="reserve-val">48</span><br>
    SCORE: <span id="score-val">0</span> | <span id="wave-status">WAVE 1</span><br>
    TRACKING: <span id="enemies-left" style="color:#0ff">0</span> TARGETS
    <div id="reload-msg">RELOAD REQUIRED</div>
</div>

<div id="joystick-container" class="touch-controls"><div id="joystick-knob"></div></div>
<div id="fire-btn" class="touch-controls touch-btn">FIRE</div>
<div id="reload-btn" class="touch-controls touch-btn">RELOAD</div>
<div id="crosshair" style="display:none;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let scene, camera, renderer, player;
let enemies=[], bullets=[], buildings=[], drops=[], particles=[];
let hp=100, score=0, keys={}, gameRunning=false;
let yaw=0, pitch=0, lastShotTime=0, shakeAmount=0;
let isMobile = false;

// Config
const MAX_PARTICLES = 80;
let ammo = 12, maxClip = 12, reserve = 48, isReloading = false;
const SHOOT_COOLDOWN = 160;
let wave = 0, enemiesToSpawn = 0, isWaveTransition = false;

let joystick = { active: false, x: 0, y: 0, touchId: null };
let lookTouch = { active: false, id: null, lastX: 0, lastY: 0 };

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const Sound = {
    play(freq, type, duration, vol) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    },
    shoot() { this.play(350, 'square', 0.1, 0.05); },
    explode() { this.play(50, 'sawtooth', 0.6, 0.12); },
    pickup() { this.play(800, 'sine', 0.2, 0.08); },
    reload() { this.play(200, 'triangle', 0.2, 0.05); },
    teleport() { this.play(1200, 'sine', 0.3, 0.03); }
};

function checkDevice() { isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0); }

function checkCollision(pos, radius) {
    for (let b of buildings) {
        if (pos.x + radius > b.minX && pos.x - radius < b.maxX &&
            pos.z + radius > b.minZ && pos.z - radius < b.maxZ &&
            pos.y < b.maxY) return true;
    }
    return false;
}

function createImpact(pos, color, count = 8, size = 0.25) {
    for (let i = 0; i < count; i++) {
        let p = particles.find(p => !p.active);
        if (!p) break;
        p.active = true; p.mesh.visible = true; p.life = 1.0;
        p.mesh.position.copy(pos);
        p.mesh.material.color.setHex(color);
        p.mesh.scale.setScalar(size);
        p.velocity.set((Math.random()-0.5)*0.4, (Math.random()-0.1)*0.4, (Math.random()-0.5)*0.4);
    }
}

function init(){
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000011, 0.04);
    
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.2));
    let light = new THREE.PointLight(0x00ffff, 1, 100);
    light.position.set(0, 50, 0);
    scene.add(light);
    
    let road = new THREE.Mesh(new THREE.PlaneGeometry(600,600), new THREE.MeshStandardMaterial({color:0x050505}));
    road.rotation.x = -Math.PI/2;
    scene.add(road);

    for(let i=0; i<45; i++){
        let bh = Math.random()*20+8;
        let mesh = new THREE.Mesh(new THREE.BoxGeometry(5,bh,5), new THREE.MeshStandardMaterial({color: 0x111111, emissive: 0x000000}));
        let bx = Math.random()*240-120, bz = Math.random()*240-120;
        if(Math.abs(bx)<15 && Math.abs(bz)<15) bx+=30;
        mesh.position.set(bx, bh/2, bz);
        scene.add(mesh);
        buildings.push({minX: bx-2.5, maxX: bx+2.5, minY: 0, maxY: bh, minZ: bz-2.5, maxZ: bz+2.5});
    }

    const pGeo = new THREE.BoxGeometry(1, 1, 1);
    for (let i = 0; i < MAX_PARTICLES; i++) {
        const pMesh = new THREE.Mesh(pGeo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
        pMesh.visible = false; scene.add(pMesh);
        particles.push({ mesh: pMesh, velocity: new THREE.Vector3(), active: false, life: 0 });
    }

    player = new THREE.Object3D();
    player.position.set(0, 1.8, 0);
    scene.add(player);

    setupInputs();
}

function setupInputs() {
    document.addEventListener("keydown", e => { keys[e.key.toLowerCase()] = true; if(e.key.toLowerCase()==='r') reload(); });
    document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
    document.addEventListener("mousedown", () => { if(gameRunning && !isMobile) shoot(); });
    document.addEventListener("mousemove", (e) => {
        if(!gameRunning || isMobile || document.pointerLockElement !== document.body) return;
        yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
        pitch = Math.max(-1.4, Math.min(1.4, pitch));
    });

    window.addEventListener("touchstart", (e) => {
        for (let t of e.changedTouches) {
            if (t.clientX < window.innerWidth / 2) { joystick.active = true; joystick.touchId = t.identifier; }
            else { lookTouch.active = true; lookTouch.id = t.identifier; lookTouch.lastX = t.clientX; lookTouch.lastY = t.clientY; }
        }
    }, {passive: false});

    window.addEventListener("touchmove", (e) => {
        for (let t of e.changedTouches) {
            if (joystick.active && t.identifier === joystick.touchId) {
                let dx = t.clientX - 90, dy = t.clientY - (window.innerHeight - 90);
                let dist = Math.min(Math.hypot(dx, dy), 50);
                let angle = Math.atan2(dy, dx);
                joystick.x = (Math.cos(angle) * dist) / 50; joystick.y = (Math.sin(angle) * dist) / 50;
                document.getElementById("joystick-knob").style.transform = `translate(${joystick.x * 35}px, ${joystick.y * 35}px)`;
            } else if (lookTouch.active && t.identifier === lookTouch.id) {
                yaw -= (t.clientX - lookTouch.lastX) * 0.007; pitch -= (t.clientY - lookTouch.lastY) * 0.007;
                pitch = Math.max(-1.4, Math.min(1.4, pitch));
                lookTouch.lastX = t.clientX; lookTouch.lastY = t.clientY;
            }
        }
    }, {passive: false});

    window.addEventListener("touchend", (e) => {
        for (let t of e.changedTouches) {
            if (t.identifier === joystick.touchId) { joystick.active = false; joystick.x = 0; joystick.y = 0; document.getElementById("joystick-knob").style.transform = `translate(0,0)`; }
            if (t.identifier === lookTouch.id) lookTouch.active = false;
        }
    });

    document.getElementById("fire-btn").addEventListener("touchstart", (e) => { e.preventDefault(); shoot(); });
    document.getElementById("reload-btn").addEventListener("touchstart", (e) => { e.preventDefault(); reload(); });
}

// FULLSCREEN TRIGGER
document.getElementById("start-button").addEventListener("click", () => {
    const doc = document.documentElement;
    if (doc.requestFullscreen) doc.requestFullscreen();
    else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
    startGame();
});

function startGame() {
    checkDevice();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById("menu").style.display = "none";
    document.getElementById("ui").style.display = "block";
    document.getElementById("crosshair").style.display = "block";
    
    if (!isMobile) {
        document.body.requestPointerLock();
    } else {
        document.querySelectorAll('.touch-controls').forEach(el => el.style.display = 'flex');
    }
    
    init();
    gameRunning = true;
    startWave(1);
    animate();
}

function startWave(num) {
    wave = num; enemiesToSpawn = 4 + (num * 2); isWaveTransition = true;
    document.getElementById("wave-status").innerText = "ANALYZING TARGETS...";
    setTimeout(() => {
        if(!gameRunning) return;
        isWaveTransition = false;
        document.getElementById("wave-status").innerText = "WAVE " + wave;
        let spawner = setInterval(() => {
            if(enemiesToSpawn > 0 && gameRunning) { spawnEnemy(); enemiesToSpawn--; } 
            else clearInterval(spawner);
        }, 900);
    }, 1500);
}

function spawnEnemy(){
    let angle = Math.random() * Math.PI * 2, dist = 30 + Math.random() * 20;
    let ex = player.position.x + Math.cos(angle) * dist, ez = player.position.z + Math.sin(angle) * dist;
    let typeRoll = Math.random();
    let type = { color: 0xff0040, hp: 100, speed: 0.08, size: 1.3 };
    if(typeRoll > 0.8) type = { color: 0xaa00ff, hp: 350, speed: 0.05, size: 2.2 };
    if(typeRoll < 0.2) type = { color: 0xffff00, hp: 50, speed: 0.16, size: 0.9 };
    
    let mesh = new THREE.Mesh(new THREE.BoxGeometry(type.size, type.size*1.8, type.size), new THREE.MeshStandardMaterial({color: type.color, emissive: type.color, emissiveIntensity: 0.8}));
    mesh.position.set(ex, type.size*0.9, ez);
    scene.add(mesh);
    enemies.push({ mesh, hp: type.hp, speed: type.speed, size: type.size, strafeDir: Math.random() > 0.5 ? 1 : -1, nextStrafeChange: Date.now() + 2000 });
}

function shoot(){
    if(!gameRunning || isReloading || ammo <= 0) return;
    const now = performance.now(); if(now - lastShotTime < SHOOT_COOLDOWN) return;
    ammo--; lastShotTime = now; Sound.shoot(); shakeAmount = 0.12;
    let bullet = new THREE.Mesh(new THREE.SphereGeometry(0.2,8,8), new THREE.MeshBasicMaterial({color:0x00ffff}));
    bullet.position.copy(player.position);
    let dir = new THREE.Vector3(-Math.sin(yaw)*Math.cos(pitch), Math.sin(pitch), -Math.cos(yaw)*Math.cos(pitch)).normalize();
    bullets.push({mesh:bullet, dir, dist:0}); scene.add(bullet);
}

function reload(){
    if(isReloading || reserve <= 0 || ammo === maxClip) return;
    isReloading = true; Sound.reload();
    setTimeout(() => { 
        let needed = maxClip - ammo; let transfer = Math.min(needed, reserve);
        ammo += transfer; reserve -= transfer; isReloading = false;
    }, 1000);
}

function animate(){
    if(!gameRunning) return;
    if(hp <= 0) { gameRunning = false; document.getElementById("gameover").style.display="flex"; document.getElementById("final-score").innerText = score; return; }
    requestAnimationFrame(animate);

    let sp = 0.2, pSize = 0.7;
    let fw = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw)), rt = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
    let mX = 0, mZ = 0;
    if (!isMobile) {
        if(keys["w"]) { mX += fw.x * sp; mZ += fw.z * sp; } if(keys["s"]) { mX -= fw.x * sp; mZ -= fw.z * sp; }
        if(keys["a"]) { mX -= rt.x * sp; mZ -= rt.z * sp; } if(keys["d"]) { mX += rt.x * sp; mZ += rt.z * sp; }
    } else if (joystick.active) {
        mX = (fw.x * -joystick.y + rt.x * joystick.x) * sp; mZ = (fw.z * -joystick.y + rt.z * joystick.x) * sp;
    }
    player.position.x += mX; if(checkCollision(player.position, pSize)) player.position.x -= mX;
    player.position.z += mZ; if(checkCollision(player.position, pSize)) player.position.z -= mZ;

    camera.position.copy(player.position);
    if(shakeAmount > 0) { camera.position.x += (Math.random()-0.5)*shakeAmount; camera.position.y += (Math.random()-0.5)*shakeAmount; shakeAmount *= 0.88; }
    camera.rotation.set(pitch, yaw, 0, 'YXZ');

    for(let i=bullets.length-1; i>=0; i--){
        let b=bullets[i];
        let nextPos = b.mesh.position.clone().add(b.dir.clone().multiplyScalar(2.2));
        if(checkCollision(nextPos, 0.2) || b.dist > 150) {
            if(b.dist <= 150) createImpact(nextPos, 0x00ffff, 5, 0.15);
            scene.remove(b.mesh); bullets.splice(i, 1); continue;
        }
        let hitEnemy = false;
        for(let e of enemies){
            let r = e.size / 2 + 0.3;
            if(nextPos.x > e.mesh.position.x-r && nextPos.x < e.mesh.position.x+r && nextPos.z > e.mesh.position.z-r && nextPos.z < e.mesh.position.z+r){
                e.hp -= 50; hitEnemy = true; createImpact(nextPos, 0xff0040, 10, 0.3); break;
            }
        }
        if(hitEnemy) { scene.remove(b.mesh); bullets.splice(i, 1); continue; }
        b.mesh.position.copy(nextPos); b.dist += 2.2;
    }

    particles.forEach(p => {
        if (!p.active) return;
        p.mesh.position.add(p.velocity); p.life -= 0.035; p.mesh.scale.setScalar(p.life * 0.5);
        if (p.life <= 0) { p.active = false; p.mesh.visible = false; }
    });

    for(let i=enemies.length-1; i>=0; i--){
        let e = enemies[i];
        if(e.hp <= 0){ Sound.explode(); score += 50; createImpact(e.mesh.position, 0xff0040, 15, 0.5); 
            if(Math.random() > 0.6) spawnDrop(e.mesh.position);
            scene.remove(e.mesh); enemies.splice(i,1); continue; 
        }

        let distToP = e.mesh.position.distanceTo(player.position);
        
        if(distToP > 85) {
            let angle = Math.random() * Math.PI * 2; let d = 25 + Math.random() * 10;
            createImpact(e.mesh.position, 0xaa00ff, 12, 0.4);
            e.mesh.position.set(player.position.x + Math.cos(angle)*d, e.size*0.9, player.position.z + Math.sin(angle)*d);
            createImpact(e.mesh.position, 0xaa00ff, 12, 0.4);
            Sound.teleport();
            continue;
        }

        let toP = player.position.clone().sub(e.mesh.position).normalize();
        let sV = new THREE.Vector3(-toP.z, 0, toP.x);
        let moveX = toP.x * e.speed;
        let moveZ = toP.z * e.speed;

        e.mesh.position.x += moveX;
        if(checkCollision(e.mesh.position, e.size/2)) {
            e.mesh.position.x -= moveX;
            e.mesh.position.z += sV.z * e.strafeDir * e.speed * 1.5;
        }

        e.mesh.position.z += moveZ;
        if(checkCollision(e.mesh.position, e.size/2)) {
            e.mesh.position.z -= moveZ;
            e.mesh.position.x += sV.x * e.strafeDir * e.speed * 1.5;
        }

        if(Date.now() > e.nextStrafeChange) {
            e.strafeDir *= (Math.random() > 0.4 ? 1 : -1);
            e.nextStrafeChange = Date.now() + 2000 + Math.random()*2000;
        }

        e.mesh.lookAt(player.position.x, e.mesh.position.y, player.position.z);
        if(distToP < 1.8) { hp -= 0.6; shakeAmount = 0.1; }
    }

    if(enemies.length === 0 && enemiesToSpawn === 0 && !isWaveTransition) startWave(wave + 1);

    for (let i = drops.length - 1; i >= 0; i--) {
        let d = drops[i]; d.mesh.rotation.y += 0.08; d.mesh.position.y = 0.8 + Math.sin(Date.now()*0.005)*0.2;
        if (player.position.distanceTo(d.mesh.position) < 2.0) {
            Sound.pickup(); if (d.type === 'hp') hp = Math.min(100, hp + 25); else reserve += 24;
            createImpact(d.mesh.position, d.type==='hp'?0xff0000:0x00ffff, 15, 0.4);
            scene.remove(d.mesh); drops.splice(i, 1);
        }
    }

    updateUI();
    renderer.render(scene, camera);
}

function spawnDrop(pos) {
    let isH = (hp < 60) ? Math.random() > 0.3 : Math.random() > 0.8;
    let col = isH ? 0xff0000 : 0x00ffff;
    let dMesh = new THREE.Mesh(new THREE.OctahedronGeometry(0.6), new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 1.5 }));
    dMesh.position.set(pos.x, 0.8, pos.z); scene.add(dMesh);
    drops.push({ mesh: dMesh, type: isH ? 'hp' : 'ammo' });
}

function updateUI() {
    document.getElementById("hp-val").innerText = Math.max(0, Math.ceil(hp));
    document.getElementById("ammo-val").innerText = ammo;
    document.getElementById("reserve-val").innerText = reserve;
    document.getElementById("score-val").innerText = score;
    document.getElementById("enemies-left").innerText = enemies.length + enemiesToSpawn;
    document.getElementById("reload-msg").style.display = (ammo <= 3 && reserve > 0) ? "block" : "none";
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
